<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mas Ferre - Logística Avanzada</title>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --azul: #0056b3; --gris: #f4f7fa; --verde: #28a745; --naranja: #f39c12; --celeste: #00a8e8; --rojo: #dc3545; }

        body { font-family: 'Segoe UI', sans-serif; background: var(--gris); margin: 0; }

        #loading-screen { display: flex; align-items: center; justify-content: center; height: 100vh; background: white; position: fixed; width: 100%; z-index: 999; }

        #login-screen, #app-screen { display: none; }

        #login-screen { align-items: center; justify-content: center; height: 100vh; padding: 20px; }

        .login-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }

        .header { background: var(--azul); color: white; padding: 20px; text-align: center; border-radius: 0 0 20px 20px; }

        .card { background: white; padding: 15px; border-radius: 12px; margin: 15px; }

        input, select, button {
            width: 100%; padding: 14px; margin-top: 10px;
            border-radius: 10px; border: 1px solid #ddd;
            font-size: 16px;
        }

        .btn-primary { background: var(--azul); color: white; border: none; }
        .btn-success { background: var(--verde); color: white; border: none; }
        .btn-warning { background: var(--naranja); color: white; border: none; }

        .orden-item { border-left: 6px solid var(--naranja); padding: 15px; margin-bottom: 10px; background: white; }

        /* TOAST */
        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 14px 22px;
            border-radius: 10px;
            color: white;
            opacity: 0;
            transition: all 0.3s;
            z-index: 2000;
            font-weight: 500;
        }
    </style>
</head>

<body>

<div id="loading-screen"><h2>Mas Ferre</h2></div>

<div id="login-screen">
    <div class="login-card">
        <h2>Mas Ferre</h2>
        <input type="text" id="user-name" placeholder="Tu nombre...">
        <select id="user-role">
            <option value="asesor">Asesor</option>
            <option value="auxiliar">Auxiliar</option>
            <option value="gerente">Gerente</option>
        </select>
        <button class="btn-primary" onclick="login()">ENTRAR</button>
    </div>
</div>

<div id="app-screen">
    <div class="header">
        <h3 id="display-role"></h3>
        <small id="display-user"></small>
        <button onclick="logout()">Salir</button>
    </div>

    <div id="view-asesor">
        <div class="card">
            <input id="searchId" placeholder="ID producto">
            <button onclick="buscarParaAsesor()">Buscar</button>
            <div id="resultadoBusqueda"></div>
        </div>
    </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
const firebaseConfig = { databaseURL: "https://mas-ferre-inventario-default-rtdb.firebaseio.com" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* TOAST */
function showToast(msg, type = "info") {
    const t = document.getElementById('toast');

    let color = "#333";
    if(type === "success") color = "#28a745";
    if(type === "error") color = "#dc3545";
    if(type === "warning") color = "#f39c12";

    t.innerText = msg;
    t.style.background = color;
    t.style.opacity = "1";

    setTimeout(() => {
        t.style.opacity = "0";
    }, 2500);
}

/* LOGIN */
function verificarSesion() {
    const u = localStorage.getItem('mf_user');
    if (u) iniciarApp(u);
    else {
        document.getElementById('loading-screen').style.display = 'none';
        document.getElementById('login-screen').style.display = 'flex';
    }
}

function login() {
    const u = document.getElementById('user-name').value.trim();
    if(!u) return showToast("Escribe tu nombre", "warning");

    localStorage.setItem('mf_user', u);
    iniciarApp(u);
}

function iniciarApp(u) {
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'block';

    document.getElementById('display-user').innerText = u;
}

/* ASESOR */
function buscarParaAsesor() {
    const id = document.getElementById('searchId').value.trim();
    if(!id) return showToast("Ingresa un ID", "warning");

    db.ref('inventario/' + id).once('value', s => {
        const item = s.val();
        if(!item) return showToast("No encontrado", "error");

        document.getElementById('resultadoBusqueda').innerHTML = `
            <b>${item.nombre}</b><br>
            Stock: ${item.cantidad}<br>
            <button onclick="enviarA('${id}','${item.nombre}',${item.cantidad})">Enviar</button>
        `;
    });
}

function enviarA(id, nom, cant) {
    db.ref('ordenes').push({
        id_prod: id,
        producto: nom,
        cantidad: cant,
        usuario: localStorage.getItem('mf_user')
    });

    showToast("Enviado correctamente", "success");
    document.getElementById('resultadoBusqueda').innerHTML = "";
}

/* LOGOUT */
function logout() {
    localStorage.clear();
    location.reload();
}

verificarSesion();
</script>

</body>
</html>
