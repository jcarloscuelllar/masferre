<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mas Ferre</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <style>
        :root { --azul: #0056b3; --gris: #f4f7fa; --verde: #28a745; --naranja: #f39c12; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--gris); margin: 0; padding: 0; }
        #login-screen { display: flex; align-items: center; justify-content: center; height: 100vh; padding: 20px; box-sizing: border-box; }
        .login-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        #app-screen { display: none; padding: 15px; }
        .header { background: var(--azul); color: white; padding: 15px; text-align: center; border-radius: 0 0 15px 15px; margin-bottom: 20px; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 15px; }
        input, select, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
        .btn-primary { background: var(--azul); color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-success { background: var(--verde); color: white; border: none; font-weight: bold; }
        .orden-item { border-left: 5px solid var(--naranja); background: #fff9f0; padding: 12px; margin-bottom: 10px; border-radius: 5px; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .logout-btn { background: none; border: 1px solid white; color: white; padding: 4px 8px; font-size: 10px; margin-top: 5px; cursor: pointer; border-radius: 5px; width: auto; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <h2 style="color:var(--azul)">Mas Ferre</h2>
        <input type="text" id="user-name" placeholder="Tu nombre...">
        <select id="user-role">
            <option value="asesor">Asesor</option>
            <option value="auxiliar">Auxiliar</option>
        </select>
        <button class="btn-primary" onclick="login()">Entrar</button>
    </div>
</div>

<div id="app-screen">
    <div class="header">
        <h3 id="display-role" style="margin:0; text-transform: uppercase;"></h3>
        <small id="display-user"></small><br>
        <button class="logout-btn" onclick="logout()">Cerrar Sesión</button>
    </div>

    <div id="view-asesor" style="display:none">
        <div class="card">
            <h4>🔎 Reportar Hueco</h4>
            <input type="text" id="searchId" placeholder="ID Producto...">
            <button class="btn-primary" onclick="buscarParaAsesor()">Consultar Producto</button>
            <div id="resultadoBusqueda"></div>
        </div>
    </div>

    <div id="view-auxiliar" style="display:none">
        <div class="card">
            <h4>📦 Tareas en Tiempo Real</h4>
            <div id="lista-ordenes">Conectando...</div>
        </div>
    </div>
</div>

<script>
    // --- CONFIGURACIÓN Y PERSISTENCIA ---
const firebaseConfig = {
    databaseURL: "https://mas-ferre-inventario-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// TRUCO 1: Forzar a la base de datos a estar activa
// Esto le dice a Firebase que mantenga los datos en memoria local
db.ref('ordenes_trabajo').keepSynced(true);

// TRUCO 2: Detectar cuando el usuario vuelve a la pestaña
// Si el auxiliar bloqueó el cel y lo desbloqueó, esto fuerza la actualización
document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "visible") {
        console.log("App visible: Reconectando...");
        firebase.database().goOnline(); // Fuerza la reconexión de red
    }
});

window.onload = () => {
    const guardadoUser = localStorage.getItem('mf_user');
    const guardadoRole = localStorage.getItem('mf_role');
    if(guardadoUser && guardadoRole) {
        iniciarApp(guardadoUser, guardadoRole);
    }
};

function login() {
    const user = document.getElementById('user-name').value;
    const role = document.getElementById('user-role').value;
    if(!user) return alert("Escribe tu nombre");
    localStorage.setItem('mf_user', user);
    localStorage.setItem('mf_role', role);
    iniciarApp(user, role);
}

function iniciarApp(user, role) {
    if(role === 'auxiliar') Notification.requestPermission();
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'block';
    document.getElementById('display-user').innerText = "Usuario: " + user;
    document.getElementById('display-role').innerText = role;

    if(role === 'asesor') {
        document.getElementById('view-asesor').style.display = 'block';
    } else {
        document.getElementById('view-auxiliar').style.display = 'block';
        iniciarEscuchaRealTime(); 
    }
}

// --- LÓGICA DE ESCUCHA (MODIFICADA) ---
function iniciarEscuchaRealTime() {
    const container = document.getElementById('lista-ordenes');
    
    // TRUCO 3: Escuchar cambios en la conexión
    const connectedRef = db.ref(".info/connected");
    connectedRef.on("value", (snap) => {
        if (snap.val() === true) {
            console.log("Conectado a Firebase");
        } else {
            console.log("Desconectado... intentando reconectar");
        }
    });

    // Escucha principal
    db.ref('ordenes_trabajo').on('value', (snapshot) => {
        const data = snapshot.val();
        
        // Si no hay datos, limpiar pantalla
        if(!data) {
            container.innerHTML = "No hay tareas pendientes.";
            window.ultimoCount = 0;
            return;
        }

        const pendientes = Object.keys(data)
            .map(key => ({key, ...data[key]}))
            .filter(o => o.estado === "Pendiente");

        // Solo lanzar alerta si el número de pendientes creció
        if(window.ultimoCount !== undefined && pendientes.length > window.ultimoCount) {
            lanzarAlerta();
        }
        window.ultimoCount = pendientes.length;

        if(pendientes.length === 0) {
            container.innerHTML = "Todo surtido. ¡Buen trabajo!";
        } else {
            // Renderizar lista
            container.innerHTML = pendientes.map(o => `
                <div class="orden-item">
                    <b>${o.producto}</b><br>
                    <small>ID: ${o.id_prod} | Por: ${o.reportado_por}</small><br>
                    <button class="btn-primary" style="margin-top:8px; padding:8px" onclick="finalizar('${o.key}')">Marcar como surtido</button>
                </div>
            `).join('');
        }
    });
}

function lanzarAlerta() {
    // Intentar vibración si el dispositivo lo permite
    if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
    
    const audio = new Audio('https://www.soundjay.com/button/beep-09.mp3');
    audio.play().catch(e => console.log("Audio bloqueado"));
    
    if (Notification.permission === "granted") {
        new Notification("¡Nueva Tarea!", { 
            body: "Hay productos por resurtir.",
            tag: "resurtido-alerta" // Evita que se amontonen mil notificaciones
        });
    }
}

function finalizar(key) {
    db.ref('ordenes_trabajo/' + key).update({
        estado: "Completado",
        finalizado_por: localStorage.getItem('mf_user')
    });
}

function logout() {
    localStorage.clear();
    location.reload();
}

</script>
</body>
</html>
