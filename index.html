<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excelencia Operativa MasFerre</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
</head>
<body class="bg-gray-50 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- CONFIGURACIÓN FIREBASE ---
        const firebaseConfig = { databaseURL: "https://mas-ferre-inventario-default-rtdb.firebaseio.com" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- CONFIG TELEGRAM ---
        const TG_TOKEN = "8706006265:AAETnU9WUcq_sbTAWd6vof9Q1VoLVobORWQ"; 
        const TG_CHAT_ID = "-1003928780691";

        function App() {
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [user, setUser] = useState({ name: "", role: "" });
            const [menuOpen, setMenuOpen] = useState(false);
            const [seccionActual, setSeccionActual] = useState("");
            const [toasts, setToasts] = useState([]);

            // Persistencia de sesión
            useEffect(() => {
                const savedUser = localStorage.getItem('mf_user');
                const savedRole = localStorage.getItem('mf_role');
                if (savedUser && savedRole) {
                    setUser({ name: savedUser, role: savedRole });
                    setSeccionActual(savedRole.charAt(0).toUpperCase() + savedRole.slice(1));
                    setIsLoggedIn(true);
                }
            }, []);

            const showToast = (msg, type = 'info') => {
                const id = Date.now();
                setToasts(prev => [...prev, { id, msg, type }]);
                setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3000);
            };

            const handleLogin = (name, role) => {
                localStorage.setItem('mf_user', name);
                localStorage.setItem('mf_role', role);
                setUser({ name, role });
                setSeccionActual(role.charAt(0).toUpperCase() + role.slice(1));
                setIsLoggedIn(true);
            };

            const logout = () => {
                localStorage.clear();
                location.reload();
            };

            if (!isLoggedIn) return <LoginScreen onLogin={handleLogin} /> ;

            return (
                <div className="min-h-screen flex flex-col">
                    <Header 
                        user={user} 
                        setMenuOpen={setMenuOpen} 
                        onLogout={logout} 
                    />
                    
                    <Sidebar 
                        isOpen={menuOpen} 
                        setIsOpen={setMenuOpen} 
                        setSeccion={setSeccionActual} 
                        seccionActual={seccionActual} 
                    />

                    <main className="flex-grow p-4 md:p-8 max-w-5xl mx-auto w-full">
                        <Toasts container={toasts} />
                        
                        {/* Notificación de Clientes en Espera (Global para ciertos roles) */}
                        <ColaEspera showToast={showToast} currentUser={user.name} />

                        <div className="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 mt-4">
                            <h2 className="text-3xl font-black text-gray-800 mb-6">{seccionActual}</h2>
                            
                            {/* Renderizado Condicional de Vistas */}
                            {seccionActual === "Asesor" && <ViewAsesor user={user} showToast={showToast} />}
                            {seccionActual === "Auxiliar" && <ViewAuxiliar user={user} showToast={showToast} />}
                            {(seccionActual === "Inventarista" || seccionActual === "Gerencia" || seccionActual === "Jefe de Autoservicio") && (
                                <ViewInventarista user={user} showToast={showToast} />
                            )}
                        </div>
                    </main>
                </div>
            );
        }

        // --- COMPONENTES ---

        function LoginScreen({ onLogin }) {
            const [name, setName] = useState("");
            const [role, setRole] = useState("asesor");

            return (
                <div className="min-h-screen flex items-center justify-center bg-blue-600 px-4">
                    <div className="max-w-md w-full bg-white rounded-2xl shadow-2xl p-8">
                        <h1 className="text-3xl font-bold text-center text-gray-800 mb-2">Mas Ferre</h1>
                        <p className="text-center text-blue-600 text-sm font-bold mb-8 uppercase tracking-widest">Excelencia Operativa</p>
                        <input 
                            type="text" placeholder="Tu nombre..." 
                            className="w-full p-3 border rounded-lg mb-4"
                            onChange={e => setName(e.target.value)}
                        />
                        <select 
                            className="w-full p-3 border rounded-lg mb-6"
                            onChange={e => setRole(e.target.value)}
                        >
                            <option value="asesor">Asesor</option>
                            <option value="auxiliar">Auxiliar</option>
                            <option value="inventarista">Inventarista</option>
                            <option value="jefe">Jefe de Autoservicio</option>
                            <option value="gerente">Gerencia</option>
                        </select>
                        <button 
                            onClick={() => name && onLogin(name, role)}
                            className="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition"
                        >ENTRAR</button>
                    </div>
                </div>
            );
        }

        function Header({ user, setMenuOpen, onLogout }) {
            return (
                <header className="bg-white shadow-md p-4 flex justify-between items-center sticky top-0 z-40">
                    <div className="flex items-center gap-4">
                        <button onClick={() => setMenuOpen(true)} className="p-2 hover:bg-gray-100 rounded-lg">
                            <svg className="w-8 h-8 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                        </button>
                        <div>
                            <h1 className="text-sm font-bold text-blue-800 leading-none">Excelencia Operativa</h1>
                            <small className="text-gray-500">{user.name} ({user.role})</small>
                        </div>
                    </div>
                    <button onClick={onLogout} className="text-xs font-bold text-red-500 hover:underline">SALIR</button>
                </header>
            );
        }

        function Sidebar({ isOpen, setIsOpen, setSeccion, seccionActual }) {
            const opciones = ["Asesor", "Auxiliar", "Inventarista", "Jefe de Autoservicio", "Gerencia", "Entregas", "Almacén"];
            return (
                <div className={`fixed inset-0 z-[100] flex transition-opacity duration-300 ${isOpen ? 'opacity-100 visible' : 'opacity-0 invisible'}`}>
                    <div className="fixed inset-0 bg-black bg-opacity-50" onClick={() => setIsOpen(false)}></div>
                    <div className={`relative bg-white w-72 h-full shadow-2xl transition-transform duration-300 transform ${isOpen ? 'translate-x-0' : '-translate-x-full'}`}>
                        <div className="p-6 border-b bg-blue-50 flex justify-between">
                            <span className="font-bold text-blue-900">MENÚ</span>
                            <button onClick={() => setIsOpen(false)} className="text-2xl">&times;</button>
                        </div>
                        <nav className="p-4 space-y-2">
                            {opciones.map(opt => (
                                <button key={opt} onClick={() => {setSeccion(opt); setIsOpen(false);}} className={`w-full text-left p-3 rounded-xl ${seccionActual === opt ? 'bg-blue-600 text-white' : 'hover:bg-gray-100 text-gray-600'}`}>{opt}</button>
                            ))}
                        </nav>
                    </div>
                </div>
            );
        }

        // --- VISTAS ESPECÍFICAS ---

        function ViewAsesor({ user, showToast }) {
            const [query, setQuery] = useState("");
            const [result, setResult] = useState(null);

            const buscar = () => {
                if(!query) return;
                db.ref('inventario/' + query).once('value', s => {
                    if(s.val()) setResult({ id: query, ...s.val() });
                    else showToast("No encontrado", "error");
                });
            };

            const enviarARama = (rama) => {
                db.ref(rama).push({
                    id_prod: result.id, producto: result.nombre, cantidad_sistema: result.cantidad,
                    reportado_por: user.name, estado: "Pendiente", fecha: new Date().toLocaleString()
                });
                showToast("Reporte enviado", "success");
                setResult(null); setQuery("");
            };

            return (
                <div className="space-y-4">
                    <div className="bg-blue-50 p-4 rounded-2xl border border-blue-100">
                        <h4 className="font-bold text-blue-800 mb-2">🔎 Consultar Stock</h4>
                        <div className="flex gap-2">
                            <input value={query} onChange={e => setQuery(e.target.value)} placeholder="Clave producto..." className="flex-1 p-2 border rounded-lg"/>
                            <button onClick={buscar} className="bg-blue-600 text-white px-4 rounded-lg">Ir</button>
                        </div>
                    </div>
                    {result && (
                        <div className="p-4 border-2 border-blue-200 rounded-2xl bg-white animate-bounce-short">
                            <p className="font-bold">{result.nombre}</p>
                            <p>Stock: <span className="text-blue-600 font-bold">{result.cantidad}</span></p>
                            <div className="grid grid-cols-2 gap-2 mt-4">
                                <button onClick={() => enviarARama('ordenes_trabajo')} className="bg-green-500 text-white p-2 rounded-lg text-sm font-bold">A SURTIDO</button>
                                <button onClick={() => enviarARama('pedidos_compras')} className="bg-orange-500 text-white p-2 rounded-lg text-sm font-bold">A COMPRAS</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function ViewAuxiliar({ user, showToast }) {
            const [tareas, setTareas] = useState([]);
            const [enfoque, setEnfoque] = useState(null);

            useEffect(() => {
                const ref = db.ref('ordenes_trabajo');
                ref.on('value', s => {
                    const data = s.val() || {};
                    const lista = Object.keys(data).map(k => ({k, ...data[k]})).filter(o => o.estado !== "Completado");
                    const activa = lista.find(o => o.tomada_por === user.name && o.estado === "En Proceso");
                    setEnfoque(activa || null);
                    setTareas(lista);
                });
                return () => ref.off();
            }, []);

            const tomarTarea = (key) => {
                db.ref('ordenes_trabajo/' + key).transaction(c => {
                    if (c && c.estado === "Pendiente") {
                        c.estado = "En Proceso"; c.tomada_por = user.name; return c;
                    }
                }, (err, committed) => {
                    if(!committed) showToast("Ya ocupada", "error");
                });
            };

            const finalizar = (k) => {
                db.ref('ordenes_trabajo/' + k).update({ estado: "Completado" });
                showToast("Terminado ✅", "success");
            };

            if (enfoque) {
                return (
                    <div className="text-center p-8 border-4 border-dashed border-blue-400 rounded-3xl bg-blue-50">
                        <span className="text-blue-600 font-bold uppercase tracking-widest">Surtiendo:</span>
                        <h1 className="text-4xl font-black my-4">{enfoque.producto}</h1>
                        <p className="text-gray-500 mb-8 font-mono">ID: {enfoque.id_prod} | Stock: {enfoque.cantidad_sistema}</p>
                        <button onClick={() => finalizar(enfoque.k)} className="w-full bg-green-500 text-white p-6 rounded-2xl text-2xl font-black shadow-xl">TERMINAR</button>
                    </div>
                );
            }

            return (
                <div className="space-y-3">
                    <h4 className="text-gray-400 font-bold text-xs uppercase italic">Tareas Disponibles</h4>
                    {tareas.length === 0 && <p className="text-center py-10 text-gray-400 italic">Todo al día...</p>}
                    {tareas.map(t => (
                        <div key={t.k} className={`p-4 rounded-2xl border-l-8 shadow-sm bg-white ${t.estado === 'En Proceso' ? 'border-blue-400' : 'border-orange-400'}`}>
                            <div className="flex justify-between items-start">
                                <div>
                                    <p className="font-bold text-lg">{t.producto}</p>
                                    <small className="text-gray-400">Solicitado por: {t.reportado_por}</small>
                                </div>
                                <span className={`text-[10px] px-2 py-1 rounded-full font-bold text-white ${t.estado === 'En Proceso' ? 'bg-blue-400' : 'bg-orange-400'}`}>{t.estado}</span>
                            </div>
                            {t.estado === 'Pendiente' && (
                                <button onClick={() => tomarTarea(t.k)} className="w-full mt-4 bg-gray-800 text-white py-2 rounded-xl font-bold">TOMAR TAREA</button>
                            )}
                        </div>
                    ))}
                </div>
            );
        }

        function ViewInventarista({ user, showToast }) {
            const [showForm, setShowForm] = useState(false);
            const [form, setForm] = useState({ clave: "", prod: "", stock: "", cliente: "", factura: "", motivo: "", fecha: new Date().toISOString().split('T')[0] });
            const [loading, setLoading] = useState(false);

            const buscarProd = (val) => {
                setForm({...form, clave: val});
                if(val.length > 2) {
                    db.ref('inventario/' + val).once('value', s => {
                        const item = s.val();
                        if(item) setForm(prev => ({...prev, prod: item.nombre, stock: item.cantidad}));
                    });
                }
            };

            const descargarCSV = () => {
                db.ref('pedidos_compras').once('value', s => {
                    const data = s.val(); if(!data) return showToast("Sin datos", "warning");
                    let csv = "ID,Producto,Stock,Fecha\n";
                    Object.values(data).forEach(o => csv += `${o.id_prod},${o.producto},${o.cantidad_sistema},${o.fecha}\n`);
                    const blob = new Blob([csv], { type: 'text/csv' });
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a'); a.href = url; a.download = 'compras.csv'; a.click();
                });
            };

            const enviarTelegram = async () => {
                if(!form.prod) return showToast("No hay producto", "error");
                setLoading(true);
                const msj = `📦 *DEVOLUCION*\n\n🔹 *Prod:* ${form.prod}\n🔹 *Cliente:* ${form.cliente}\n🔹 *Motivo:* ${form.motivo}\n\n👤 *Por:* ${user.name}`;
                try {
                    await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ chat_id: TG_CHAT_ID, text: msj, parse_mode: 'Markdown' })
                    });
                    showToast("Enviado a Telegram", "success");
                } catch (e) { showToast("Error Telegram", "error"); }
                setLoading(false);
            };

            return (
                <div className="space-y-4">
                    <div className="grid grid-cols-2 gap-4">
                        <button onClick={() => setShowForm(!showForm)} className="bg-white border-2 border-blue-600 p-6 rounded-3xl text-center shadow-lg active:scale-95 transition">
                            <span className="text-3xl">🔄</span><br/><b className="text-blue-800">Devolución</b>
                        </button>
                        <button onClick={descargarCSV} className="bg-white border-2 border-green-600 p-6 rounded-3xl text-center shadow-lg active:scale-95 transition">
                            <span className="text-3xl">📥</span><br/><b className="text-green-800">CSV Compras</b>
                        </button>
                    </div>

                    {showForm && (
                        <div className="bg-gray-50 p-4 rounded-3xl border border-blue-200 animate-[slideUp_0.4s_ease]">
                            <h4 className="font-bold text-blue-700 mb-4 uppercase text-center">Registro de Devolución</h4>
                            <input value={form.clave} onChange={e => buscarProd(e.target.value)} placeholder="Clave..." className="w-full p-3 border rounded-xl mb-2"/>
                            {form.prod && <div className="p-3 bg-blue-100 rounded-xl mb-2 text-sm"><b>{form.prod}</b> | Stock: {form.stock}</div>}
                            <input value={form.cliente} onChange={e => setForm({...form, cliente: e.target.value})} placeholder="Cliente..." className="w-full p-3 border rounded-xl mb-2"/>
                            <input value={form.factura} onChange={e => setForm({...form, factura: e.target.value})} placeholder="Factura..." className="w-full p-3 border rounded-xl mb-2"/>
                            <textarea value={form.motivo} onChange={e => setForm({...form, motivo: e.target.value})} placeholder="Motivo..." className="w-full p-3 border rounded-xl mb-4"></textarea>
                            <button disabled={loading} onClick={enviarTelegram} className="w-full bg-blue-600 text-white py-4 rounded-2xl font-black shadow-lg">
                                {loading ? "ENVIANDO..." : "✈️ ENVIAR A TELEGRAM"}
                            </button>
                        </div>
                    )}
                </div>
            );
        }

        function ColaEspera({ showToast, currentUser }) {
            const [cola, setCola] = useState([]);

            useEffect(() => {
                const ref = db.ref('cola_espera');
                ref.on('value', s => {
                    const data = s.val() || {};
                    const esperando = Object.keys(data).map(k => ({k, ...data[k]})).filter(c => c.estado === "esperando");
                    setCola(esperando);
                });
                return () => ref.off();
            }, []);

            const atender = (id) => {
                db.ref('cola_espera/' + id).transaction(c => {
                    if (c && c.estado === "esperando") {
                        c.estado = "atendiendo"; c.asesor_id = currentUser; return c;
                    }
                }, (err, comm) => {
                    if(comm) showToast("Cliente asignado", "success");
                });
            };

            if(cola.length === 0) return null;

            return (
                <div className="bg-orange-50 border-2 border-orange-200 p-4 rounded-3xl mb-6 shadow-sm">
                    <h3 className="text-orange-700 font-black text-sm uppercase mb-3 flex items-center gap-2">
                        <span className="animate-ping w-2 h-2 rounded-full bg-orange-500"></span>
                        Clientes en Espera
                    </h3>
                    <div className="space-y-2">
                        {cola.map(c => (
                            <div key={c.k} className="bg-white p-3 rounded-2xl flex justify-between items-center shadow-sm border border-orange-100">
                                <span className="font-bold text-gray-700">{c.nombre}</span>
                                <button onClick={() => atender(c.k)} className="bg-orange-500 text-white px-4 py-2 rounded-xl text-xs font-bold shadow-md">ATENDER</button>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function Toasts({ container }) {
            return (
                <div className="fixed bottom-4 left-1/2 -translate-x-1/2 z-[200] w-[90%] max-w-xs space-y-2">
                    {container.map(t => (
                        <div key={t.id} className={`p-4 rounded-2xl text-white text-center font-bold shadow-2xl animate-[slideUp_0.3s_ease] ${t.type === 'error' ? 'bg-red-500' : t.type === 'success' ? 'bg-green-500' : 'bg-gray-800'}`}>
                            {t.msg}
                        </div>
                    ))}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <style>
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-bounce-short { animation: bounce 1s ease-in-out 1; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
    </style>
</body>
</html>
