<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mas Ferre - Real Time</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <style>
        :root { --azul: #0056b3; --gris: #f4f7fa; --verde: #28a745; --naranja: #f39c12; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--gris); margin: 0; padding: 0; }
        #login-screen { display: flex; align-items: center; justify-content: center; height: 100vh; padding: 20px; box-sizing: border-box; }
        .login-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        #app-screen { display: none; padding: 15px; }
        .header { background: var(--azul); color: white; padding: 15px; text-align: center; border-radius: 0 0 15px 15px; margin-bottom: 20px; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 15px; }
        input, select, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
        .btn-primary { background: var(--azul); color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-success { background: var(--verde); color: white; border: none; font-weight: bold; }
        .orden-item { border-left: 5px solid var(--naranja); background: #fff9f0; padding: 12px; margin-bottom: 10px; border-radius: 5px; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <h2 style="color:var(--azul)">Mas Ferre</h2>
        <input type="text" id="user-name" placeholder="Tu nombre...">
        <select id="user-role">
            <option value="asesor">Asesor (Reportar)</option>
            <option value="auxiliar">Auxiliar (Surtir)</option>
        </select>
        <button class="btn-primary" onclick="login()">Entrar</button>
    </div>
</div>

<div id="app-screen">
    <div class="header">
        <h3 id="display-role" style="margin:0; text-transform: uppercase;"></h3>
        <small id="display-user"></small>
    </div>

    <div id="view-asesor" style="display:none">
        <div class="card">
            <h4>🔎 Reportar Hueco</h4>
            <input type="text" id="searchId" placeholder="ID Producto...">
            <button class="btn-primary" onclick="buscarParaAsesor()">Consultar Producto</button>
            <div id="resultadoBusqueda"></div>
        </div>
    </div>

    <div id="view-auxiliar" style="display:none">
        <div class="card">
            <h4>📦 Tareas en Tiempo Real</h4>
            <div id="lista-ordenes">Esperando órdenes...</div>
        </div>
    </div>
</div>

<script>
    // CONFIGURACIÓN DE FIREBASE (Usa tus datos reales aquí)
    const firebaseConfig = {
        databaseURL: "https://mas-ferre-inventario-default-rtdb.firebaseio.com"
    };
    
    // Inicializar Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentUser = "";
    let currentRole = "";

    function login() {
        currentUser = document.getElementById('user-name').value;
        currentRole = document.getElementById('user-role').value;
        if(!currentUser) return alert("Escribe tu nombre");

        if(currentRole === 'auxiliar') Notification.requestPermission();

        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app-screen').style.display = 'block';
        document.getElementById('display-user').innerText = "Usuario: " + currentUser;
        document.getElementById('display-role').innerText = currentRole;

        if(currentRole === 'asesor') {
            document.getElementById('view-asesor').style.display = 'block';
        } else {
            document.getElementById('view-auxiliar').style.display = 'block';
            iniciarEscuchaRealTime(); 
        }
    }

    // --- LÓGICA ASESOR (Escritura) ---
    async function buscarParaAsesor() {
        const id = document.getElementById('searchId').value.trim();
        db.ref('inventario/' + id).once('value', (snapshot) => {
            const item = snapshot.val();
            if(item) {
                document.getElementById('resultadoBusqueda').innerHTML = `
                    <div class="card" style="border:1px solid #ddd; margin-top:10px;">
                        <b>${item.nombre}</b><br>
                        <button class="btn-success" onclick="enviarOrden('${id}', '${item.nombre}')">REPORTAR HUECO</button>
                    </div>`;
            } else { alert("No encontrado"); }
        });
    }

    function enviarOrden(id, nombre) {
        db.ref('ordenes_trabajo').push({
            id_prod: id,
            producto: nombre,
            reportado_por: currentUser,
            timestamp: firebase.database.ServerValue.TIMESTAMP,
            estado: "Pendiente"
        });
        alert("¡Enviado!");
        document.getElementById('resultadoBusqueda').innerHTML = "";
    }

    // --- LÓGICA AUXILIAR (Escucha Real Time) ---
    function iniciarEscuchaRealTime() {
        // Esta es la "magia". Se ejecuta cada vez que algo cambie en la base de datos.
        db.ref('ordenes_trabajo').on('value', (snapshot) => {
            const data = snapshot.val();
            const container = document.getElementById('lista-ordenes');
            
            if(!data) {
                container.innerHTML = "No hay tareas.";
                return;
            }

            const pendientes = Object.keys(data)
                .map(key => ({key, ...data[key]}))
                .filter(o => o.estado === "Pendiente");

            // Notificar si hay algo nuevo
            if(window.ultimoCount && pendientes.length > window.ultimoCount) {
                lanzarAlerta();
            }
            window.ultimoCount = pendientes.length;

            container.innerHTML = pendientes.map(o => `
                <div class="orden-item">
                    <b>${o.producto}</b><br>
                    <small>Pedida por: ${o.reportado_por}</small><br>
                    <button class="btn-primary" style="margin-top:5px; padding:5px" onclick="finalizar('${o.key}')">Listo, surtido</button>
                </div>
            `).join('');
        });
    }

    function lanzarAlerta() {
        new Audio('https://www.soundjay.com/button/beep-09.mp3').play();
        if (Notification.permission === "granted") {
            new Notification("¡Nueva Tarea!", { body: "Hay un nuevo producto por resurtir." });
        }
    }

    function finalizar(key) {
        db.ref('ordenes_trabajo/' + key).update({
            estado: "Completado",
            finalizado_por: currentUser
        });
    }
</script>
</body>
</html>
