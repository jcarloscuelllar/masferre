<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tetris Pro Mobile</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: #050505;
            color: white;
            font-family: system-ui, -apple-system, sans-serif;
            touch-action: manipulation; /* Evita el zoom al tocar rápido */
        }
        .grid-cell { width: 100%; aspect-ratio: 1/1; border: 1px solid rgba(255, 255, 255, 0.05); }
        .ghost { opacity: 0.2; }
        .active { box-shadow: inset 0 0 8px rgba(255,255,255,0.4); }
        /* Estilo para los botones táctiles */
        .control-btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            touch-action: none;
        }
        .control-btn:active { background: rgba(255, 255, 255, 0.3); transform: scale(0.95); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div id="root" class="w-full max-w-md px-4"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        const COLS = 10;
        const ROWS = 20;
        const TETROMINOS = {
            I: { shape: [[0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0]], color: '#00f0f0' },
            J: { shape: [[0, 1, 0], [0, 1, 0], [1, 1, 0]], color: '#2e5bff' },
            L: { shape: [[0, 1, 0], [0, 1, 0], [0, 1, 1]], color: '#ff8e0d' },
            O: { shape: [[1, 1], [1, 1]], color: '#ffe600' },
            S: { shape: [[0, 1, 1], [1, 1, 0], [0, 0, 0]], color: '#47ff47' },
            T: { shape: [[0, 1, 0], [1, 1, 1], [0, 0, 0]], color: '#b026ff' },
            Z: { shape: [[1, 1, 0], [0, 1, 1], [0, 0, 0]], color: '#ff3030' },
        };

        const randomPiece = () => {
            const keys = Object.keys(TETROMINOS);
            const type = keys[Math.floor(Math.random() * keys.length)];
            return { ...TETROMINOS[type], type };
        };

        function Tetris() {
            const [grid, setGrid] = useState(Array.from(Array(ROWS), () => Array(COLS).fill([0, 'clear'])));
            const [piece, setPiece] = useState(randomPiece());
            const [pos, setPos] = useState({ x: 3, y: 0 });
            const [score, setScore] = useState(0);
            const [gameOver, setGameOver] = useState(false);

            const checkCollision = useCallback((nextPos, shape = piece.shape) => {
                for (let y = 0; y < shape.length; y++) {
                    for (let x = 0; x < shape[y].length; x++) {
                        if (shape[y][x] !== 0) {
                            const newY = y + nextPos.y;
                            const newX = x + nextPos.x;
                            if (newY >= ROWS || newX < 0 || newX >= COLS || (grid[newY] && grid[newY][newX][1] !== 'clear')) {
                                return true;
                            }
                        }
                    }
                }
                return false;
            }, [piece, grid]);

            const move = (dir) => {
                if (!checkCollision({ x: pos.x + dir, y: pos.y })) setPos(prev => ({ ...prev, x: prev.x + dir }));
            };

            const rotate = () => {
                const rotated = piece.shape[0].map((_, i) => piece.shape.map(row => row[i]).reverse());
                if (!checkCollision(pos, rotated)) setPiece(prev => ({ ...prev, shape: rotated }));
            };

            const drop = useCallback(() => {
                if (!checkCollision({ x: pos.x, y: pos.y + 1 })) {
                    setPos(prev => ({ ...prev, y: prev.y + 1 }));
                } else {
                    if (pos.y < 1) return setGameOver(true);
                    const newGrid = [...grid];
                    piece.shape.forEach((row, y) => {
                        row.forEach((value, x) => {
                            if (value !== 0) newGrid[y + pos.y][x + pos.x] = [piece.type, 'merged'];
                        });
                    });
                    
                    let linesCleared = 0;
                    const sweptGrid = newGrid.reduce((acc, row) => {
                        if (row.every(c => c[1] === 'merged')) {
                            linesCleared++;
                            acc.unshift(Array(COLS).fill([0, 'clear']));
                        } else acc.push(row);
                        return acc;
                    }, []);

                    if (linesCleared > 0) setScore(s => s + (linesCleared * 100));
                    setGrid(sweptGrid);
                    setPiece(randomPiece());
                    setPos({ x: 3, y: 0 });
                }
            }, [grid, piece, pos, checkCollision]);

            const hardDrop = () => {
                let finalY = pos.y;
                while (!checkCollision({ x: pos.x, y: finalY + 1 })) finalY++;
                setPos(prev => ({ ...prev, y: finalY }));
            };

            useEffect(() => {
                if (gameOver) return;
                const id = setInterval(drop, 800);
                return () => clearInterval(id);
            }, [drop, gameOver]);

            let ghostY = pos.y;
            while (!checkCollision({ x: pos.x, y: ghostY + 1 })) ghostY++;

            return (
                <div className="flex flex-col gap-4">
                    {/* Header Score */}
                    <div className="flex justify-between items-end px-2">
                        <h1 className="text-xl font-black italic tracking-tighter">TETRIS<span className="text-cyan-400">PRO</span></h1>
                        <div className="text-right">
                            <p className="text-[10px] text-gray-500 uppercase font-bold">Score</p>
                            <p className="text-2xl font-mono leading-none">{score}</p>
                        </div>
                    </div>

                    {/* Tablero */}
                    <div className="relative aspect-[1/2] w-full max-w-[300px] mx-auto border-2 border-white/10 bg-white/5 grid grid-cols-10 gap-px p-px rounded-lg overflow-hidden">
                        {grid.map((row, y) => row.map((cell, x) => {
                            let color = cell[0] !== 0 ? TETROMINOS[cell[0]].color : 'transparent';
                            let classes = "grid-cell ";
                            piece.shape.forEach((pRow, py) => {
                                pRow.forEach((pVal, px) => {
                                    if (pVal !== 0) {
                                        if (py + pos.y === y && px + pos.x === x) { color = piece.color; classes += "active"; }
                                        else if (py + ghostY === y && px + pos.x === x) { color = piece.color; classes += "ghost"; }
                                    }
                                });
                            });
                            return <div key={`${x}-${y}`} className={classes} style={{ backgroundColor: color }} />;
                        }))}
                        {gameOver && (
                            <div className="absolute inset-0 bg-black/80 backdrop-blur-sm flex flex-col items-center justify-center">
                                <h2 className="text-red-500 font-black text-2xl mb-4">GAME OVER</h2>
                                <button onClick={() => window.location.reload()} className="px-6 py-2 bg-white text-black font-bold rounded-full text-sm">REINTENTAR</button>
                            </div>
                        )}
                    </div>

                    {/* Controles Táctiles */}
                    <div className="grid grid-cols-3 gap-2 max-w-[300px] mx-auto w-full mt-2">
                        <div className="flex flex-col gap-2">
                             <button className="control-btn h-14 w-full text-xl" onClick={() => move(-1)}>←</button>
                        </div>
                        <div className="flex flex-col gap-2">
                             <button className="control-btn h-14 w-full text-xl" onClick={rotate}>↻</button>
                             <button className="control-btn h-14 w-full text-xl" onClick={drop}>↓</button>
                        </div>
                        <div className="flex flex-col gap-2">
                             <button className="control-btn h-14 w-full text-xl" onClick={() => move(1)}>→</button>
                        </div>
                        <button className="control-btn col-span-3 h-12 text-xs font-bold tracking-widest uppercase bg-cyan-500/20" onClick={hardDrop}>Hard Drop</button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Tetris />);
    </script>
</body>
</html>
