<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gauss-Jordan Solver Pro | Statics Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Fira+Code&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .mono { font-family: 'Fira Code', monospace; }
    </style>
</head>
<body class="bg-slate-900 text-slate-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const App = () => {
            const [matrix, setMatrix] = useState([]);
            const [results, setResults] = useState([]);
            const [error, setError] = useState('');

            const solveGaussJordan = (data) => {
                let m = data.map(row => row.map(val => parseFloat(val)));
                let n = m.length;

                for (let i = 0; i < n; i++) {
                    // Pivoteo parcial
                    let max = i;
                    for (let k = i + 1; k < n; k++) {
                        if (Math.abs(m[k][i]) > Math.abs(m[max][i])) max = k;
                    }
                    [m[i], m[max]] = [m[max], m[i]];

                    let pivot = m[i][i];
                    if (Math.abs(pivot) < 1e-12) continue;

                    for (let j = i; j <= n; j++) {
                        m[i][j] /= pivot;
                    }

                    for (let k = 0; k < n; k++) {
                        if (k !== i) {
                            let factor = m[k][i];
                            for (let j = i; j <= n; j++) {
                                m[k][j] -= factor * m[i][j];
                            }
                        }
                    }
                }
                return m.map(row => row[n]);
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                const reader = new FileReader();

                reader.onload = (evt) => {
                    try {
                        const bstr = evt.target.result;
                        const wb = XLSX.read(bstr, { type: 'binary' });
                        const ws = wb.Sheets[wb.SheetNames[0]];
                        const data = XLSX.utils.sheet_to_json(ws, { header: 1 });

                        // Limpiar datos: quitar filas vacías y convertir a números
                        const cleanData = data
                            .filter(row => row.length > 0 && !isNaN(parseFloat(row[0])))
                            .map(row => row.filter(cell => cell !== null && cell !== "").map(Number));

                        if (cleanData.length > 0 && cleanData[0].length === cleanData.length + 1) {
                            setMatrix(cleanData);
                            const res = solveGaussJordan(cleanData);
                            setResults(res);
                            setError('');
                        } else {
                            setError("Formato inválido. Asegúrate de que sea Nx(N+1). Ej: 3 ecuaciones = 3 filas y 4 columnas.");
                        }
                    } catch (err) {
                        setError("Error al procesar el archivo. Revisa que solo contenga números.");
                    }
                };
                reader.readAsBinaryString(file);
            };

            return (
                <div className="min-h-screen p-4 md:p-12">
                    <div className="max-w-5xl mx-auto">
                        <header className="mb-10 text-center md:text-left">
                            <h1 className="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">
                                Gauss-Jordan Solver
                            </h1>
                            <p className="text-slate-400 mt-2">Carga tu sistema de ecuaciones desde Excel para resolver tensiones y estructuras.</p>
                        </header>

                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                            {/* Panel Izquierdo: Carga */}
                            <div className="lg:col-span-1 space-y-6">
                                <div className="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-xl">
                                    <h2 className="text-lg font-semibold mb-4 text-blue-300">1. Subir Datos</h2>
                                    <label className="flex flex-col items-center justify-center w-full h-32 border-2 border-slate-600 border-dashed rounded-xl cursor-pointer hover:bg-slate-700 hover:border-blue-500 transition-all">
                                        <div className="flex flex-col items-center justify-center pt-5 pb-6">
                                            <svg className="w-8 h-8 mb-3 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                                            <p className="text-sm text-slate-400">Click para cargar .xlsx</p>
                                        </div>
                                        <input type="file" className="hidden" accept=".xlsx, .xls" onChange={handleFileUpload} />
                                    </label>
                                    {error && <p className="mt-4 text-xs text-red-400 bg-red-900/20 p-3 rounded-lg border border-red-900/50">{error}</p>}
                                </div>

                                <div className="bg-blue-900/10 p-6 rounded-2xl border border-blue-800/30">
                                    <h3 className="text-sm font-bold text-blue-400 uppercase tracking-widest mb-2">Instrucciones</h3>
                                    <p className="text-xs text-slate-400 leading-relaxed">
                                        El archivo debe contener solo números. <br/><br/>
                                        Si tienes 3 incógnitas (T1, T2, T3), tu Excel debe tener 3 filas y 4 columnas. La última columna es el término independiente (el peso o fuerza).
                                    </p>
                                </div>
                            </div>

                            {/* Panel Derecho: Resultados */}
                            <div className="lg:col-span-2 space-y-6">
                                <div className="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-xl min-h-[300px]">
                                    <h2 className="text-lg font-semibold mb-6 text-emerald-400 flex items-center">
                                        <span className="mr-2">⚡</span> Solución del Sistema
                                    </h2>
                                    
                                    {results.length > 0 ? (
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                            {results.map((val, i) => (
                                                <div key={i} className="bg-slate-900 p-4 rounded-xl border border-slate-700 flex justify-between items-center">
                                                    <span className="mono text-blue-400 font-bold text-lg underline decoration-blue-500/30">x_{i+1}</span>
                                                    <span className="mono text-2xl text-white">{val.toFixed(4)}</span>
                                                </div>
                                            ))}
                                        </div>
                                    ) : (
                                        <div className="flex flex-col items-center justify-center h-48 text-slate-500">
                                            <p className="italic">No hay datos para mostrar...</p>
                                        </div>
                                    )}

                                    {matrix.length > 0 && (
                                        <div className="mt-8">
                                            <h3 className="text-xs font-bold text-slate-500 uppercase mb-4 tracking-tighter">Matriz Procesada</h3>
                                            <div className="overflow-x-auto">
                                                <table className="w-full text-left text-xs mono">
                                                    <tbody>
                                                        {matrix.map((row, i) => (
                                                            <tr key={i} className="border-t border-slate-700/50">
                                                                {row.map((c, j) => (
                                                                    <td key={j} className={`py-2 px-3 ${j === row.length-1 ? 'text-emerald-400 font-bold bg-emerald-900/10' : 'text-slate-400'}`}>
                                                                        {c}
                                                                    </td>
                                                                ))}
                                                            </tr>
                                                        ))}
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>

                        <footer className="mt-12 text-center text-slate-600 text-xs">
                            Desarrollado para Statics Lab v1.0 | Algoritmo de Gauss-Jordan con Pivoteo Parcial
                        </footer>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
