<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excelencia Operativa MasFerre</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans">

    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [menuOpen, setMenuOpen] = useState(false);
            const [seccionActual, setSeccionActual] = useState("Inicio");
            const [user, setUser] = useState({ username: "", password: "" });

            const opcionesMenu = [
                "Asesor", "Auxiliar", "Inventarista", 
                "Jefe de Autoservicio", "Gerencia", "Entregas", "Almacén"
            ];

            const manejarLogin = (e) => {
                e.preventDefault();
                if(user.username && user.password) {
                    setIsLoggedIn(true);
                } else {
                    alert("Por favor ingresa usuario y contraseña");
                }
            };

            if (!isLoggedIn) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-blue-600 px-4">
                        <div className="max-w-md w-full bg-white rounded-2xl shadow-2xl p-8">
                            <div className="text-center mb-8">
                                <h1 className="text-3xl font-extrabold text-gray-800">MasFerre</h1>
                                <p className="text-blue-600 font-semibold uppercase tracking-widest text-sm">Excelencia Operativa</p>
                            </div>
                            <form onSubmit={manejarLogin} className="space-y-6">
                                <div>
                                    <label className="block text-sm font-medium text-gray-700">Usuario</label>
                                    <input 
                                        type="text" 
                                        required
                                        className="mt-1 block w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500"
                                        onChange={(e) => setUser({...user, username: e.target.value})}
                                    />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700">Contraseña</label>
                                    <input 
                                        type="password" 
                                        required
                                        className="mt-1 block w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500"
                                        onChange={(e) => setUser({...user, password: e.target.value})}
                                    />
                                </div>
                                <button type="submit" className="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition duration-300 shadow-lg">
                                    ENTRAR
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Header con Z-Index corregido */}
                    <header className="bg-white shadow-md p-4 flex justify-between items-center sticky top-0 z-40">
                        <div className="flex items-center gap-4">
                            <button 
                                onClick={() => setMenuOpen(!menuOpen)}
                                className="p-2 hover:bg-gray-100 rounded-lg transition"
                            >
                                <svg className="w-8 h-8 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6h16M4 12h16M4 18h16"></path>
                                </svg>
                            </button>
                            <h1 className="text-lg md:text-xl font-bold text-blue-800">Excelencia Operativa MasFerre</h1>
                        </div>
                        <button onClick={() => setIsLoggedIn(false)} className="text-sm font-semibold text-red-500 hover:underline">
                            Cerrar Sesión
                        </button>
                    </header>

                    {/* Menú Lateral con Corrección de Visibilidad */}
                    {menuOpen && (
                        <div className="fixed inset-0 z-[100] flex">
                            {/* Overlay oscuro */}
                            <div className="fixed inset-0 bg-black bg-opacity-50" onClick={() => setMenuOpen(false)}></div>
                            
                            {/* Panel del Menú */}
                            <div className="relative bg-white w-72 max-w-[80vw] h-full shadow-2xl flex flex-col animate-[slideIn_0.3s_ease-out]">
                                
                                {/* Encabezado del Menú para evitar que se oculte "Asesor" */}
                                <div className="p-6 border-b flex justify-between items-center bg-blue-50">
                                    <h2 className="text-xs font-bold text-blue-900 uppercase tracking-widest">Navegación</h2>
                                    <button onClick={() => setMenuOpen(false)} className="text-gray-400 hover:text-gray-600 text-2xl font-light">&times;</button>
                                </div>

                                {/* Opciones con Scroll independiente */}
                                <nav className="flex-1 overflow-y-auto p-4 space-y-2">
                                    {opcionesMenu.map(opcion => (
                                        <button 
                                            key={opcion}
                                            onClick={() => { setSeccionActual(opcion); setMenuOpen(false); }}
                                            className={`w-full text-left px-4 py-4 rounded-xl transition-all font-medium ${
                                                seccionActual === opcion 
                                                ? 'bg-blue-600 text-white shadow-md' 
                                                : 'hover:bg-gray-100 text-gray-600'
                                            }`}
                                        >
                                            {opcion}
                                        </button>
                                    ))}
                                </nav>
                                <div className="p-4 border-t text-[10px] text-center text-gray-400 font-medium">
                                    © 2024 MasFerre Operaciones
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Contenido Principal */}
                    <main className="flex-grow p-4 md:p-12 max-w-5xl mx-auto w-full">
                        <div className="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-gray-100">
                            <span className="text-blue-600 font-bold text-xs md:text-sm uppercase tracking-wider">Módulo Seleccionado</span>
                            <h2 className="text-3xl md:text-4xl font-black text-gray-800 mt-2 mb-6">{seccionActual}</h2>
                            
                            <div className="prose max-w-none text-gray-600">
                                <p className="text-base md:text-lg">Bienvenido a la sección de <strong>{seccionActual}</strong>.</p>
                                <hr className="my-6 border-gray-100" />
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div className="p-6 border rounded-2xl bg-blue-50 border-blue-100">
                                        <h3 className="font-bold text-blue-800 mb-2">Tareas Pendientes</h3>
                                        <p className="text-sm">Aquí se listarán las actividades de control para esta área.</p>
                                    </div>
                                    <div className="p-6 border rounded-2xl bg-green-50 border-green-100">
                                        <h3 className="font-bold text-green-800 mb-2">Reportes del Día</h3>
                                        <p className="text-sm">Visualiza el avance operativo en tiempo real.</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>

                    <style>{`
                        @keyframes slideIn {
                            from { transform: translateX(-100%); }
                            to { transform: translateX(0); }
                        }
                    `}</style>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
