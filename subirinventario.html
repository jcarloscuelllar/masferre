<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carga Masiva MasFerre - Limpieza Total</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const firebaseConfig = { 
            databaseURL: "https://mas-ferre-inventario-default-rtdb.firebaseio.com" 
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const CargaInventarioCSV = () => {
            const [archivo, setArchivo] = useState(null);
            const [cargando, setCargando] = useState(false);
            const [status, setStatus] = useState({ texto: "", tipo: "" });

            const procesarCSV = (e) => setArchivo(e.target.files[0]);

            const subirAFirebase = () => {
                if (!archivo) return alert("Selecciona un archivo");
                
                setCargando(true);
                setStatus({ texto: "Limpiando base de datos y procesando...", tipo: "info" });
                
                const reader = new FileReader();
                reader.onload = (e) => {
                    const contenido = e.target.result;
                    const lineas = contenido.split("\n");
                    const batch = {};

                    for (let i = 1; i < lineas.length; i++) {
                        const columnas = lineas[i].split(",");
                        if (columnas.length < 2 || !columnas[0]) continue; 

                        // SOLUCIÓN CEROS: Quitamos ceros a la izquierda de la clave
                        const claveLimpia = columnas[0].trim().replace(/^0+/, '');
                        
                        batch[claveLimpia] = {
                            clave: claveLimpia,
                            codbar: columnas[1]?.trim() || "00000000",
                            descripcion: columnas[2]?.trim() || "Sin descripción",
                            unidad: columnas[3]?.trim() || "PZA",
                            marca: columnas[4]?.trim() || "GENÉRICO",
                            existencia: parseInt(columnas[5]) || 0,
                            ultima_actualización: new Date().toLocaleString()
                        };
                    }

                    // SOLUCIÓN DUPLICADOS: .set() reemplaza TODA la rama 'stock'
                    db.ref('stock').set(batch)
                        .then(() => {
                            setStatus({ texto: "✅ Base de datos renovada con éxito", tipo: "success" });
                            setCargando(false);
                            setArchivo(null);
                        })
                        .catch((err) => {
                            setStatus({ texto: "❌ Error al subir", tipo: "error" });
                            setCargando(false);
                        });
                };
                reader.readAsText(archivo);
            };

            return (
                <div className="max-w-md w-full bg-white rounded-[2.5rem] p-8 shadow-2xl">
                    <h1 className="text-2xl font-black text-center text-slate-800 mb-2 italic">MASFERRE</h1>
                    <p className="text-center text-xs font-bold text-blue-500 uppercase tracking-widest mb-8">Actualización Maestra</p>
                    
                    {status.texto && (
                        <div className={`mb-6 p-4 rounded-2xl text-xs font-bold text-center ${status.tipo === 'success' ? 'bg-green-100 text-green-700' : 'bg-blue-100 text-blue-700'}`}>
                            {status.texto}
                        </div>
                    )}

                    <div className="space-y-4">
                        <div className="relative border-2 border-dashed border-slate-200 rounded-3xl p-10 text-center hover:bg-slate-50 transition-all">
                            <input type="file" accept=".csv" onChange={procesarCSV} className="absolute inset-0 opacity-0 cursor-pointer" />
                            <span className="text-3xl mb-2 block">📂</span>
                            <p className="text-sm font-bold text-slate-500">{archivo ? archivo.name : "Subir CSV"}</p>
                        </div>

                        <div className="bg-amber-50 p-4 rounded-2xl border border-amber-100">
                            <p className="text-[10px] text-amber-700 font-bold leading-tight">
                                ⚠️ ADVERTENCIA: Esta acción borrará el stock anterior y cargará solo los datos de este archivo. Las claves se guardarán sin ceros a la izquierda.
                            </p>
                        </div>

                        <button 
                            onClick={subirAFirebase}
                            disabled={cargando || !archivo}
                            className="w-full bg-slate-900 text-white py-5 rounded-2xl font-black uppercase tracking-tighter shadow-xl active:scale-95 disabled:bg-slate-200 transition-all"
                        >
                            {cargando ? "RESCRIBIENDO STOCK..." : "BORRAR Y CARGAR NUEVO STOCK"}
                        </button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<CargaInventarioCSV />);
    </script>
</body>
</html>
